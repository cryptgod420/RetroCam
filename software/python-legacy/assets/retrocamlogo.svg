<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 60" width="100%" height="100%">
  <defs>
    <style>
      @font-face {
        font-family: 'CamFont';
        src: url('/font/retrocam.otf') format('opentype');
      }
      .logo-text {
        font-family: 'CamFont', 'Courier New', monospace;
        font-size: 32px;
        fill: #ffffff;
        font-weight: normal;
        letter-spacing: 2px;
      }
      .sub-text {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #ffffff;
        letter-spacing: 0.5px;
      }
    </style>
  </defs>
  <text x="125" y="35" class="logo-text" text-anchor="middle">RETROCAM</text>
  <text x="195" y="52" class="sub-text" text-anchor="end">Based on optocam</text>
</svg>
